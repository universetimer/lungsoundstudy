<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도감 | 청진음 학습기</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css?v=9" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5A8A" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="청진음 학습기" />
  <meta property="og:title" content="도감 모드 | 청진음 학습기" />
  <meta property="og:description" content="6개 라벨의 실제 임상 청진음을 듣고 특징·임상 의의·감별점 학습." />
  <meta property="og:url" content="https://lungsoundstudy.com/catalog.html" />
  <meta property="og:image" content="https://lungsoundstudy.com/og-image-v2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="도감 모드 | 청진음 학습기" />
  <meta name="twitter:description" content="6개 라벨의 실제 임상 청진음을 듣고 특징·임상 의의·감별점 학습." />
  <meta name="twitter:image" content="https://lungsoundstudy.com/og-image-v2.png" />
</head>
<body>
  <div id="siteHeader"></div>

  <section class="page-hero" style="padding:36px 0 40px;">
    <div class="container">
      <span class="eyebrow" data-i18n="catalog.eyebrow"></span>
      <h1 style="font-size:30px;" data-i18n="catalog.h1"></h1>
      <p data-i18n="catalog.intro"></p>
    </div>
  </section>

  <main class="section">
    <div class="container catalog-layout">
      <aside class="sidebar">
        <h4 data-i18n="catalog.sidebar.labels"></h4>
        <div id="navList"></div>
      </aside>

      <div>
        <div class="viz-help">
          <div class="viz-help-item">
            <span class="viz-help-dot" style="background:#14B8A6"></span>
            <div><strong data-i18n="catalog.help.wf.title"></strong> — <span data-i18n="catalog.help.wf.body"></span></div>
          </div>
          <div class="viz-help-item">
            <span class="viz-help-dot" style="background:linear-gradient(180deg,#FCE694,#E04A89,#23114E)"></span>
            <div><strong data-i18n="catalog.help.sg.title"></strong> — <span data-i18n="catalog.help.sg.body"></span></div>
          </div>
          <div class="viz-help-foot" data-i18n="catalog.help.foot"></div>
        </div>
        <div id="content"></div>
      </div>
    </div>
  </main>

  <div id="siteFooter"></div>

  <script src="js/i18n.js?v=9"></script>
  <script src="js/data.js?v=9"></script>
  <script src="js/storage.js?v=9"></script>
  <script src="js/common.js?v=9"></script>
  <script src="js/audio-viz.js?v=9"></script>
  <script>
    UI.mount("catalog");

    let activeLabel = "crackle";

    function render() {
      const lang = I18n.current();
      const counts = sampleCountByLabel();
      const navList = document.getElementById("navList");
      navList.innerHTML = LABEL_ORDER.map(lab => {
        const meta = LABELS[lab];
        return `
          <button class="nav-item ${lab === activeLabel ? "active" : ""}" data-lab="${lab}">
            <span>${UI.escapeHtml(UI.labelName(meta))}</span>
            <span class="badge">${counts[lab]}</span>
          </button>
        `;
      }).join("");
      navList.querySelectorAll(".nav-item").forEach(btn => {
        btn.addEventListener("click", () => { activeLabel = btn.dataset.lab; render(); });
      });

      const meta = LABELS[activeLabel];
      const samples = SAMPLES_BY_LABEL[activeLabel];
      const content = document.getElementById("content");
      const typeText = lang === "ko" ? meta.type : meta.typeEn;
      content.innerHTML = `
        <article class="sound-card">
          <div class="sound-card-header">
            <div>
              <h2>${UI.escapeHtml(lang === "ko" ? meta.name : meta.nameEn)}</h2>
              <div class="name-en">${UI.escapeHtml(typeText)} · ${I18n.t("catalog.samples", { n: samples.length })}</div>
            </div>
            <span class="${UI.pillFor(activeLabel)}">${UI.escapeHtml(UI.labelName(meta))}</span>
          </div>
          <p style="color:var(--text-soft); margin-bottom:10px;">${UI.escapeHtml(UI.labelField(meta, "short"))}</p>
          <div class="sound-meta">
            <div class="meta-row"><span class="meta-label">${I18n.t("catalog.meta.quality")}</span><span class="meta-value">${UI.escapeHtml(UI.labelField(meta, "quality"))}</span></div>
            <div class="meta-row"><span class="meta-label">${I18n.t("catalog.meta.timing")}</span><span class="meta-value">${UI.escapeHtml(UI.labelField(meta, "timing"))}</span></div>
            <div class="meta-row"><span class="meta-label">${I18n.t("catalog.meta.pitch")}</span><span class="meta-value">${UI.escapeHtml(UI.labelField(meta, "pitch"))}</span></div>
          </div>
          <div class="sound-section"><h4>${I18n.t("catalog.section.clinical")}</h4><p>${UI.escapeHtml(UI.labelField(meta, "clinical"))}</p></div>
          <div class="sound-section"><h4>${I18n.t("catalog.section.distinguish")}</h4><p>${UI.escapeHtml(UI.labelField(meta, "distinguish"))}</p></div>
          <div class="sound-section"><h4>${I18n.t("catalog.section.tip")}</h4><p>${UI.escapeHtml(UI.labelField(meta, "tip"))}</p></div>
        </article>

        <h3 style="margin:24px 0 12px; font-size:16px; color:var(--text-soft);">${I18n.t("catalog.sample.count", { n: samples.length })}</h3>
        <div class="sample-list">
          ${samples.map((f) => `
            <div class="sample-item" data-file="${f}">
              <div class="fname">${UI.escapeHtml(f)}</div>
              ${UI.audioElement(f)}
            </div>
          `).join("")}
        </div>
      `;

      Storage.recordStudy(samples[0]);

      content.querySelectorAll(".sample-item audio").forEach(a => {
        a.addEventListener("play", () => {
          const file = a.closest(".sample-item").dataset.file;
          Storage.recordStudy(file);
        }, { once: true });
      });
    }

    render();
    window.addEventListener("langchange", render);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비교 | 청진음 학습기</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css?v=9" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5A8A" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="청진음 학습기" />
  <meta property="og:title" content="비교 모드 | 청진음 학습기" />
  <meta property="og:description" content="서로 다른 라벨의 청진음 샘플을 동시·번갈아 재생하며 감별 포인트 학습." />
  <meta property="og:url" content="https://lungsoundstudy.com/compare.html" />
  <meta property="og:image" content="https://lungsoundstudy.com/og-image-v2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="비교 모드 | 청진음 학습기" />
  <meta name="twitter:description" content="서로 다른 라벨의 청진음 샘플을 동시·번갈아 재생하며 감별 포인트 학습." />
  <meta name="twitter:image" content="https://lungsoundstudy.com/og-image-v2.png" />
</head>
<body>
  <div id="siteHeader"></div>

  <section class="page-hero" style="padding:36px 0 40px;">
    <div class="container">
      <span class="eyebrow" data-i18n="compare.eyebrow"></span>
      <h1 style="font-size:30px;" data-i18n="compare.h1"></h1>
      <p data-i18n="compare.intro"></p>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <div class="compare-controls">
        <div class="field">
          <label data-i18n="compare.labelA"></label>
          <select id="labA"></select>
        </div>
        <div class="field">
          <label data-i18n="compare.labelB"></label>
          <select id="labB"></select>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn btn-ghost" id="shuffleBtn" data-i18n="compare.shuffle"></button>
          <button class="btn btn-primary" id="playBoth" data-i18n="compare.playboth"></button>
          <button class="btn btn-outline" id="playAlt" data-i18n="compare.playalt"></button>
          <button class="btn btn-ghost" id="stopAll" data-i18n="compare.stop"></button>
        </div>
      </div>

      <div class="preset-row" id="presetRow"></div>

      <div class="compare-grid">
        <div id="cardA"></div>
        <div id="cardB"></div>
      </div>
    </div>
  </main>

  <div id="siteFooter"></div>

  <script src="js/i18n.js?v=9"></script>
  <script src="js/data.js?v=9"></script>
  <script src="js/storage.js?v=9"></script>
  <script src="js/common.js?v=9"></script>
  <script src="js/audio-viz.js?v=9"></script>
  <script>
    UI.mount("compare");

    const labA = document.getElementById("labA");
    const labB = document.getElementById("labB");

    function fillSelect(sel, value) {
      const lang = I18n.current();
      sel.innerHTML = LABEL_ORDER.map(lab => {
        const meta = LABELS[lab];
        const a = UI.labelName(meta);
        const b = lang === "ko" ? meta.name : meta.nameEn;
        return `<option value="${lab}">${a} (${b})</option>`;
      }).join("");
      sel.value = value;
    }

    let currentA = null, currentB = null;

    function pickSample(label) {
      const arr = SAMPLES_BY_LABEL[label];
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function cardHtml(side, label, file) {
      const meta = LABELS[label];
      const lang = I18n.current();
      const nameMain = lang === "ko" ? meta.name : meta.nameEn;
      return `
        <article class="sound-card">
          <div class="sound-card-header">
            <div>
              <h2>${side}. ${UI.escapeHtml(nameMain)}</h2>
              <div class="name-en" style="font-family:ui-monospace,monospace; font-size:12px;">${UI.escapeHtml(file)}</div>
            </div>
            <span class="${UI.pillFor(label)}">${UI.escapeHtml(UI.labelName(meta))}</span>
          </div>
          ${UI.audioElement(file)}
          <div class="sound-meta">
            <div class="meta-row"><span class="meta-label">${I18n.t("compare.meta.timing")}</span><span class="meta-value">${UI.escapeHtml(UI.labelField(meta, "timing"))}</span></div>
            <div class="meta-row"><span class="meta-label">${I18n.t("compare.meta.pitch")}</span><span class="meta-value">${UI.escapeHtml(UI.labelField(meta, "pitch"))}</span></div>
            <div class="meta-row"><span class="meta-label">${I18n.t("compare.meta.quality")}</span><span class="meta-value">${UI.escapeHtml(UI.labelField(meta, "quality"))}</span></div>
          </div>
          <div class="sound-section"><h4>${I18n.t("compare.section.clinical")}</h4><p>${UI.escapeHtml(UI.labelField(meta, "clinical"))}</p></div>
          <div class="sound-section"><h4>${I18n.t("compare.section.distinguish")}</h4><p>${UI.escapeHtml(UI.labelField(meta, "distinguish"))}</p></div>
        </article>
      `;
    }

    function render() {
      currentA = pickSample(labA.value);
      currentB = pickSample(labB.value);
      document.getElementById("cardA").innerHTML = cardHtml("A", labA.value, currentA);
      document.getElementById("cardB").innerHTML = cardHtml("B", labB.value, currentB);
      Storage.recordStudy(currentA);
      Storage.recordStudy(currentB);
    }

    function refresh() {
      const a = labA.value, b = labB.value;
      fillSelect(labA, a); fillSelect(labB, b);
      document.getElementById("cardA").innerHTML = cardHtml("A", a, currentA);
      document.getElementById("cardB").innerHTML = cardHtml("B", b, currentB);
    }
    window.addEventListener("langchange", refresh);

    function getAudios() {
      return [
        document.querySelector("#cardA audio"),
        document.querySelector("#cardB audio"),
      ].filter(Boolean);
    }
    function stopAll() {
      getAudios().forEach(a => { a.pause(); a.currentTime = 0; });
    }
    document.getElementById("playBoth").addEventListener("click", () => {
      stopAll();
      window.__allowConcurrentPlay = true;
      Promise.all(getAudios().map(a => a.play().catch(() => {})))
        .finally(() => setTimeout(() => { window.__allowConcurrentPlay = false; }, 300));
    });
    document.getElementById("playAlt").addEventListener("click", async () => {
      stopAll();
      // 번갈아 재생은 한 번에 하나만 활성이므로 단일 재생 로직과 호환됨
      const [a, b] = getAudios();
      if (!a || !b) return;
      try { await a.play(); a.onended = () => b.play(); } catch (e) {}
    });
    document.getElementById("stopAll").addEventListener("click", stopAll);
    document.getElementById("shuffleBtn").addEventListener("click", render);

    labA.addEventListener("change", render);
    labB.addEventListener("change", render);

    // 프리셋
    const presetRow = document.getElementById("presetRow");
    presetRow.innerHTML = COMPARE_PRESETS.map((p, i) => `
      <button class="preset-chip" data-i="${i}" title="${UI.escapeHtml(p.description)}">${UI.escapeHtml(p.title)}</button>
    `).join("");
    presetRow.querySelectorAll(".preset-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        const p = COMPARE_PRESETS[parseInt(btn.dataset.i, 10)];
        labA.value = p.a; labB.value = p.b; render();
      });
    });

    // 초기값
    const first = COMPARE_PRESETS[0];
    fillSelect(labA, first.a);
    fillSelect(labB, first.b);
    render();
  </script>
</body>
</html>

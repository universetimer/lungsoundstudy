<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lung Sound Study | 청진음 학습기</title>
  <meta name="description" content="Listen, learn and test with 271 real labeled lung sound wave files." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5A8A" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Lung Sound Study" />
  <meta property="og:title" content="Lung Sound Study | 청진음 학습기" />
  <meta property="og:description" content="Listen, learn and test with 271 real labeled lung sound wave files." />
  <meta property="og:url" content="https://lungsoundstudy.com/" />
  <meta property="og:image" content="https://lungsoundstudy.com/og-image-v2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:locale:alternate" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lung Sound Study | 청진음 학습기" />
  <meta name="twitter:description" content="Listen, learn and test with 271 real labeled lung sound wave files." />
  <meta name="twitter:image" content="https://lungsoundstudy.com/og-image-v2.png" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css?v=11" />
</head>
<body>
  <div id="siteHeader"></div>

  <section class="page-hero">
    <div class="container">
      <span class="eyebrow" data-i18n="home.eyebrow"></span>
      <h1 data-i18n-html="home.h1"></h1>
      <p data-i18n="home.intro"></p>
      <div style="margin-top:22px; display:flex; gap:10px; flex-wrap:wrap;">
        <a href="catalog.html" class="btn btn-primary" data-i18n="home.cta.catalog"></a>
        <a href="quiz.html" class="btn btn-outline" style="color:white; border-color:rgba(255,255,255,0.6);" data-i18n="home.cta.quiz"></a>
      </div>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <h2 class="section-title" data-i18n="home.section.status"></h2>
      <p class="section-subtitle" data-i18n="home.section.status.sub"></p>
      <div class="stat-strip" id="statStrip"></div>

      <h2 class="section-title" style="margin-top:48px;" data-i18n="home.section.modes"></h2>
      <p class="section-subtitle" data-i18n="home.section.modes.sub"></p>
      <div class="mode-grid">
        <a href="guide.html" class="mode-card">
          <div class="mode-icon">🩺</div>
          <h3 data-i18n="mode.guide.title"></h3>
          <p data-i18n="mode.guide.desc"></p>
        </a>
        <a href="catalog.html" class="mode-card">
          <div class="mode-icon">📚</div>
          <h3 data-i18n="mode.catalog.title"></h3>
          <p data-i18n="mode.catalog.desc"></p>
        </a>
        <a href="quiz.html" class="mode-card">
          <div class="mode-icon">📝</div>
          <h3 data-i18n="mode.quiz.title"></h3>
          <p data-i18n="mode.quiz.desc"></p>
        </a>
        <a href="compare.html" class="mode-card">
          <div class="mode-icon">🎧</div>
          <h3 data-i18n="mode.compare.title"></h3>
          <p data-i18n="mode.compare.desc"></p>
        </a>
        <a href="videos.html" class="mode-card">
          <div class="mode-icon">🎬</div>
          <h3 data-i18n="mode.videos.title"></h3>
          <p data-i18n="mode.videos.desc"></p>
        </a>
        <a href="stats.html" class="mode-card">
          <div class="mode-icon">📊</div>
          <h3 data-i18n="mode.stats.title"></h3>
          <p data-i18n="mode.stats.desc"></p>
        </a>
      </div>

      <h2 class="section-title" style="margin-top:48px;" data-i18n="home.section.dataset"></h2>
      <div class="stat-strip" id="datasetStrip"></div>
    </div>
  </main>

  <div id="siteFooter"></div>

  <script src="js/i18n.js?v=11"></script>
  <script src="js/data.js?v=11"></script>
  <script src="js/storage.js?v=11"></script>
  <script src="js/common.js?v=11"></script>
  <script src="js/audio-viz.js?v=11"></script>
  <script>
    function renderHome() {
      UI.mount("home");
      const acc = Storage.getAccuracy();
      const state = Storage.load();
      const studiedCount = Object.keys(state.studiedFiles).length;
      const lang = I18n.current();

      document.getElementById("statStrip").innerHTML = `
        <div class="stat-card">
          <div class="label">${I18n.t("home.stat.accuracy")}</div>
          <div class="value">${acc.total ? (acc.rate * 100).toFixed(0) + "%" : "—"}</div>
          <div class="sub">${I18n.t("home.stat.accuracy.sub", { correct: acc.correct, total: acc.total })}</div>
        </div>
        <div class="stat-card">
          <div class="label">${I18n.t("home.stat.studied")}</div>
          <div class="value">${studiedCount} / ${ALL_SAMPLES.length}</div>
          <div class="sub">${I18n.t("home.stat.studied.sub")}</div>
        </div>
        <div class="stat-card">
          <div class="label">${I18n.t("home.stat.attempts")}</div>
          <div class="value">${acc.total}</div>
          <div class="sub">${I18n.t("home.stat.attempts.sub", { correct: acc.correct, wrong: acc.wrong })}</div>
        </div>
        <div class="stat-card">
          <div class="label">${I18n.t("home.stat.lastvisit")}</div>
          <div class="value" style="font-size:18px;">${state.lastVisit ? new Date(state.lastVisit).toLocaleDateString(lang === "ko" ? "ko-KR" : "en-US") : "—"}</div>
          <div class="sub">${state.lastVisit ? new Date(state.lastVisit).toLocaleTimeString(lang === "ko" ? "ko-KR" : "en-US") : I18n.t("home.stat.lastvisit.none")}</div>
        </div>
      `;

      const counts = sampleCountByLabel();
      document.getElementById("datasetStrip").innerHTML = LABEL_ORDER.map(lab => {
        const meta = LABELS[lab];
        return `
          <div class="stat-card" style="border-top:4px solid ${meta.color}">
            <div class="label">${UI.escapeHtml(UI.labelName(meta))}</div>
            <div class="value">${counts[lab]}</div>
            <div class="sub">${UI.escapeHtml(lang === "ko" ? meta.name : meta.nameEn)}</div>
          </div>
        `;
      }).join("");
    }
    renderHome();
    window.addEventListener("langchange", renderHome);
  </script>
</body>
</html>

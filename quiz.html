<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz | Lung Sound Study</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css?v=10" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#0E5A8A" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Lung Sound Study" />
  <meta property="og:title" content="Quiz | Lung Sound Study" />
  <meta property="og:description" content="Multiple choice quiz on real lung sound wave files." />
  <meta property="og:url" content="https://lungsoundstudy.com/quiz.html" />
  <meta property="og:image" content="https://lungsoundstudy.com/og-image-v2.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Quiz | Lung Sound Study" />
  <meta name="twitter:description" content="Multiple choice quiz on real lung sound wave files." />
  <meta name="twitter:image" content="https://lungsoundstudy.com/og-image-v2.png" />
</head>
<body>
  <div id="siteHeader"></div>

  <section class="page-hero" style="padding:36px 0 40px;">
    <div class="container">
      <span class="eyebrow" data-i18n="quiz.eyebrow"></span>
      <h1 style="font-size:30px;" data-i18n="quiz.h1"></h1>
      <p data-i18n="quiz.intro"></p>
    </div>
  </section>

  <main class="section">
    <div class="container">
      <div class="quiz-setup" id="setupView">
        <h2 class="section-title" style="margin-bottom:16px;" data-i18n="quiz.setup.title"></h2>

        <div class="field">
          <label data-i18n="quiz.setup.count"></label>
          <select id="setQuestions">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>

        <div class="field">
          <label data-i18n="quiz.setup.labels"></label>
          <div class="checkbox-group" id="setLabels"></div>
        </div>

        <div class="field">
          <label data-i18n="quiz.setup.time"></label>
          <div class="checkbox-group">
            <label class="chip-check active" data-time="0"><input type="radio" name="time" value="0" checked /> <span data-i18n="quiz.time.none"></span></label>
            <label class="chip-check" data-time="15"><input type="radio" name="time" value="15" /> <span data-i18n="quiz.time.15"></span></label>
            <label class="chip-check" data-time="30"><input type="radio" name="time" value="30" /> <span data-i18n="quiz.time.30"></span></label>
          </div>
        </div>

        <button class="btn btn-primary btn-block" id="startQuiz" style="margin-top:8px;" data-i18n="quiz.start"></button>
      </div>

      <div class="quiz-panel" id="quizView" style="display:none;">
        <div class="quiz-progress">
          <span id="progressText"></span>
          <span id="scoreText"></span>
        </div>
        <div class="quiz-bar"><div class="quiz-bar-fill" id="progressFill"></div></div>

        <div class="quiz-timer" id="timer" style="display:none;"></div>
        <div class="quiz-question" data-i18n="quiz.question"></div>
        <div id="audioContainer"></div>
        <div class="option-grid" id="options"></div>
        <div class="quiz-feedback" id="feedback" style="display:none;"></div>

        <div class="quiz-actions">
          <button class="btn btn-ghost" id="quitBtn" data-i18n="quiz.quit"></button>
          <button class="btn btn-primary" id="nextBtn" style="display:none;" data-i18n="quiz.next"></button>
        </div>
      </div>

      <div class="quiz-panel" id="resultView" style="display:none;">
        <div class="quiz-result">
          <div class="score" id="resultScore"></div>
          <p id="resultText" style="margin-top:8px; color:var(--text-muted);"></p>
          <div style="margin-top:20px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button class="btn btn-primary" id="retryBtn" data-i18n="quiz.retry"></button>
            <a href="stats.html" class="btn btn-outline" data-i18n="quiz.gotostats"></a>
            <a href="catalog.html" class="btn btn-ghost" data-i18n="quiz.gotocatalog"></a>
          </div>
          <div id="missedList" style="margin-top:28px; text-align:left;"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="siteFooter"></div>

  <script src="js/i18n.js?v=10"></script>
  <script src="js/data.js?v=10"></script>
  <script src="js/storage.js?v=10"></script>
  <script src="js/common.js?v=10"></script>
  <script src="js/audio-viz.js?v=10"></script>
  <script>
    UI.mount("quiz");

    const labContainer = document.getElementById("setLabels");
    function renderLabels() {
      labContainer.innerHTML = LABEL_ORDER.map(lab => `
        <label class="chip-check active" data-lab="${lab}">
          <input type="checkbox" value="${lab}" checked /> ${UI.escapeHtml(UI.labelName(LABELS[lab]))}
        </label>
      `).join("");
      labContainer.querySelectorAll(".chip-check").forEach(el => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          const inp = el.querySelector("input");
          inp.checked = !inp.checked;
          el.classList.toggle("active", inp.checked);
        });
      });
    }
    renderLabels();
    window.addEventListener("langchange", () => { renderLabels(); });

    document.querySelectorAll('.chip-check[data-time]').forEach(el => {
      el.addEventListener("click", (e) => {
        e.preventDefault();
        document.querySelectorAll('.chip-check[data-time]').forEach(c => c.classList.remove("active"));
        el.classList.add("active");
        el.querySelector("input").checked = true;
      });
    });

    let quiz = null;

    function getSelectedLabels() {
      return Array.from(labContainer.querySelectorAll('input:checked')).map(i => i.value);
    }
    function getSelectedTime() {
      const el = document.querySelector('.chip-check[data-time].active');
      return el ? parseInt(el.dataset.time, 10) : 0;
    }

    function buildQuiz() {
      const n = parseInt(document.getElementById("setQuestions").value, 10);
      const labels = getSelectedLabels();
      const time = getSelectedTime();
      const lang = I18n.current();

      if (labels.length < 4) {
        alert(lang === "ko" ? "출제 범위에 최소 4개 라벨이 필요합니다 (4지선다)." : "Need at least 4 labels for 4-choice quiz.");
        return null;
      }
      const pool = ALL_SAMPLES.filter(s => labels.includes(s.label));
      if (pool.length < n) {
        const msg = lang === "ko"
          ? `선택한 범위의 샘플 수(${pool.length})가 문제 수(${n})보다 적습니다. 중복을 허용해 계속할까요?`
          : `Sample pool (${pool.length}) is smaller than question count (${n}). Allow duplicates?`;
        if (!confirm(msg)) return null;
      }

      const shuffled = UI.shuffle(pool);
      const questions = [];
      for (let i = 0; i < n; i++) {
        const sample = shuffled[i % shuffled.length];
        const distractorLabels = UI.shuffle(labels.filter(l => l !== sample.label)).slice(0, 3);
        const optLabels = UI.shuffle([sample.label, ...distractorLabels]);
        questions.push({ sample, optLabels });
      }
      return { questions, index: 0, score: 0, missed: [], time, timerHandle: null, locked: false };
    }

    function startQuiz() {
      quiz = buildQuiz();
      if (!quiz) return;
      document.getElementById("setupView").style.display = "none";
      document.getElementById("resultView").style.display = "none";
      document.getElementById("quizView").style.display = "block";
      renderQuestion();
    }

    function renderQuestion() {
      const q = quiz.questions[quiz.index];
      const lang = I18n.current();
      quiz.locked = false;

      document.getElementById("progressText").textContent = `${quiz.index + 1} / ${quiz.questions.length}`;
      document.getElementById("scoreText").textContent = I18n.t("quiz.progress", { n: quiz.score });
      document.getElementById("progressFill").style.width = (quiz.index / quiz.questions.length * 100) + "%";

      document.getElementById("audioContainer").innerHTML = UI.audioElement(q.sample.file);

      document.getElementById("options").innerHTML = q.optLabels.map((lab, i) => {
        const meta = LABELS[lab];
        const sub = lang === "ko" ? meta.name : meta.nameEn;
        return `
          <button class="option-btn" data-lab="${lab}">
            <strong>${String.fromCharCode(65 + i)}.</strong> ${UI.escapeHtml(UI.labelName(meta))}
            <div style="font-size:12px; color:var(--text-muted); margin-top:2px;">${UI.escapeHtml(sub)}</div>
          </button>
        `;
      }).join("");
      document.querySelectorAll("#options .option-btn").forEach(btn => {
        btn.addEventListener("click", () => pick(btn.dataset.lab));
      });

      document.getElementById("feedback").style.display = "none";
      document.getElementById("nextBtn").style.display = "none";

      const timerEl = document.getElementById("timer");
      if (quiz.time > 0) {
        let remain = quiz.time;
        timerEl.style.display = "block";
        timerEl.textContent = I18n.t("quiz.timer", { n: remain });
        clearInterval(quiz.timerHandle);
        quiz.timerHandle = setInterval(() => {
          remain -= 1;
          timerEl.textContent = I18n.t("quiz.timer", { n: remain });
          if (remain <= 0) {
            clearInterval(quiz.timerHandle);
            if (!quiz.locked) pick(null);
          }
        }, 1000);
      } else {
        timerEl.style.display = "none";
      }
    }

    function pick(pickedLabel) {
      if (quiz.locked) return;
      quiz.locked = true;
      clearInterval(quiz.timerHandle);

      const q = quiz.questions[quiz.index];
      const correct = q.sample.label === pickedLabel;
      const lang = I18n.current();

      document.querySelectorAll("#options .option-btn").forEach(b => {
        b.classList.add("disabled");
        if (b.dataset.lab === q.sample.label) b.classList.add("correct");
        else if (b.dataset.lab === pickedLabel) b.classList.add("wrong");
      });

      const fb = document.getElementById("feedback");
      fb.style.display = "block";
      const cm = LABELS[q.sample.label];
      const cmName = lang === "ko" ? cm.name : cm.nameEn;
      const cmDist = UI.labelField(cm, "distinguish");
      if (correct) {
        quiz.score += 1;
        fb.className = "quiz-feedback correct";
        fb.innerHTML = `<strong>${I18n.t("quiz.correct")}</strong> ${UI.escapeHtml(cmName)}<br />${UI.escapeHtml(cmDist)}`;
      } else {
        fb.className = "quiz-feedback wrong";
        const pickedTxt = pickedLabel ? UI.escapeHtml(UI.labelName(LABELS[pickedLabel])) : I18n.t("quiz.timeout");
        fb.innerHTML = `<strong>${I18n.t("quiz.wrong.prefix")} ${UI.escapeHtml(cmName)}</strong><br />${I18n.t("quiz.wrong.picked")}: ${pickedTxt}<br />${UI.escapeHtml(cmDist)}`;
        quiz.missed.push({ file: q.sample.file, correctLabel: q.sample.label, pickedLabel });
      }

      Storage.recordAttempt(q.sample.file, q.sample.label, pickedLabel, "quiz");
      document.getElementById("scoreText").textContent = I18n.t("quiz.progress", { n: quiz.score });

      const nextBtn = document.getElementById("nextBtn");
      nextBtn.style.display = "inline-flex";
      nextBtn.textContent = quiz.index === quiz.questions.length - 1 ? I18n.t("quiz.result") : I18n.t("quiz.next");
    }

    document.getElementById("startQuiz").addEventListener("click", startQuiz);
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (quiz.index === quiz.questions.length - 1) finish();
      else { quiz.index += 1; renderQuestion(); }
    });
    document.getElementById("quitBtn").addEventListener("click", () => {
      clearInterval(quiz.timerHandle); finish();
    });
    document.getElementById("retryBtn").addEventListener("click", () => {
      document.getElementById("resultView").style.display = "none";
      document.getElementById("setupView").style.display = "block";
    });

    function finish() {
      clearInterval(quiz.timerHandle);
      document.getElementById("quizView").style.display = "none";
      document.getElementById("resultView").style.display = "block";

      const total = quiz.questions.length;
      const pct = total ? Math.round((quiz.score / total) * 100) : 0;
      document.getElementById("resultScore").textContent = `${quiz.score} / ${total} (${pct}%)`;

      let key = "quiz.comment.low";
      if (pct === 100) key = "quiz.comment.100";
      else if (pct >= 80) key = "quiz.comment.80";
      else if (pct >= 50) key = "quiz.comment.50";
      document.getElementById("resultText").textContent = I18n.t(key);

      const missedEl = document.getElementById("missedList");
      if (quiz.missed.length === 0) { missedEl.innerHTML = ""; return; }
      const lang = I18n.current();
      missedEl.innerHTML = `
        <h3 style="margin-bottom:10px;">${I18n.t("quiz.missed.title")}</h3>
        ${quiz.missed.map(m => {
          const cm = LABELS[m.correctLabel];
          const cmName = lang === "ko" ? cm.name : cm.nameEn;
          return `
            <div class="sound-card" style="margin-bottom:10px; padding:14px 16px;">
              <div class="sound-card-header" style="margin-bottom:8px;">
                <div>
                  <strong>${UI.escapeHtml(cmName)}</strong>
                  <div class="name-en" style="font-family:ui-monospace,monospace; font-size:12px;">${UI.escapeHtml(m.file)}</div>
                </div>
                <span class="${UI.pillFor(m.correctLabel)}">${UI.escapeHtml(UI.labelName(cm))}</span>
              </div>
              ${UI.audioElement(m.file)}
              <p style="margin-top:8px; font-size:14px; color:var(--text-soft)">${UI.escapeHtml(UI.labelField(cm, "distinguish"))}</p>
            </div>
          `;
        }).join("")}
      `;
    }
  </script>
</body>
</html>
